<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Proyecto Roleplay | Normativas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="background"></div>

    <div id="loadingScreen">

        <img id="logo" src="assets/logo.png" alt="">

        <div class="loading-card">
            <div class="loading-inner">

                <h1>Cargando normativa...</h1>

                <p id="loadingHint">
                    
                </p>

                <div class="spinner"></div>

            </div>
        </div>

    </div>

    <main id="menu">

        <img id="logo" src="assets/logo.png" alt="" width="20">

        <div class="cards">

            <img class="card" src="assets/general.png" data-book="general">

            <img class="card" src="assets/leo.png" data-book="leo">

            <img class="card" src="assets/comercios.png" data-book="comercios">

            <img class="card" src="assets/gobierno.png" data-book="gobierno">

            <img class="card" src="assets/ilegales.png" data-book="ilegales">

            <img class="card" src="assets/ems.png" data-book="ems">

            <img class="card" src="assets/staff.png" data-book="staff">

            <img class="card" src="assets/streamers.png" data-book="streamers">

            <img class="card" src="assets/playmaker.png" data-book="playmaker">

        </div>

    </main>

    <section id="viewer">

        <button id="back">

            ← Volver

        </button>

        <iframe id="flipbook"></iframe>

    </section>

    <script type="module" src="app.js"></script>

</body>

</html>
