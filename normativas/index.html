<!DOCTYPE html>
<html lang="es">
<head>

        <img class="card" data-book="staff" src="assets/staff.webp">

    </div>

</div>

<div id="viewer">

    <iframe id="flipbook"></iframe>

</div>

<script src="app.js"></script>

</html>
